apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 9292;
      server_name ntfy.myzopotamia.dev;

      # Block UI/panel
      location = / {
          return 403;
      }

      location ^~ /static/ {
          return 403;
      }

      # Allow only these ntfy topics, singly or comma-separated, with optional endpoint suffix
      # Examples allowed:
      #   /backups
      #   /uptime/json
      #   /website/raw
      #   /backups,uptime,website/json?since=...
      location ~ ^/(?:backups|uptime|website)(?:,(?:backups|uptime|website))*(?:/(?:json|sse|raw|ws))?$ {
          proxy_pass http://127.0.0.1;
          proxy_set_header Host $host;
          proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
          proxy_set_header X-Real-IP $http_cf_connecting_ip;
          proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
      }

      # Block everything else
      location / {
          return 403;
      }
    }
