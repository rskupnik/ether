apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 9292;
      server_name ntfy.myzopotamia.dev;

      # Block UI/panel
      location = / {
          return 403;
      }

      location ^~ /static/ {
          return 403;
      }

      # Allow only these ntfy topics, singly or comma-separated, with optional endpoint suffix
      # Examples allowed:
      #   /backups
      #   /uptime/json
      #   /website/raw
      #   /backups,uptime,website/json?since=...
      location ~ ^/(?:backups|uptime|website)(?:,(?:backups|uptime|website))*(?:/(?:json|sse|raw|ws))?$ {
          proxy_pass http://127.0.0.1;
          proxy_http_version 1.1;

          proxy_buffering off;
          proxy_request_buffering off;
          proxy_redirect off;

          proxy_set_header Host $http_host;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

          proxy_connect_timeout 3m;
          proxy_send_timeout 3m;
          proxy_read_timeout 3m;

          client_max_body_size 0; # Stream request body to backend

          #proxy_set_header Host $host;
          #proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
          #proxy_set_header X-Real-IP $http_cf_connecting_ip;
          #proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
      }

      # Block everything else
      location / {
          return 403;
      }
    }
