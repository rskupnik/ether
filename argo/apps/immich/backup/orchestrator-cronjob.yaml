apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-backup-orchestrator
  namespace: immich
  labels:
    components.nora/ntfy-token: enabled
spec:
  schedule: "0 2 * * *"
  
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: immich-backup-sa
          
          containers:
            - name: orchestrator
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  #!/usr/bin/env bash
                  set -Eeuo pipefail

                  notify_success() {
                    curl \
                      -H "Authorization: Bearer $NTFY_TOKEN" \
                      -H "Priority: min" \
                      -H "Tags: white_check_mark" \
                      -d "Immich backup successful" \
                      --insecure \
                      https://ntfy.nora/backups
                  }

                  notify_failure() {
                    local exit_code="$1"
                    local failed_at="$2"

                    curl \
                      -H "Authorization: Bearer $NTFY_TOKEN" \
                      -H "Priority: high" \
                      -H "Tags: warning" \
                      -d "Immich backup FAILED at: ${failed_at}. Exit code: ${exit_code}" \
                      --insecure \
                      https://ntfy.nora/backups || true
                  }

                  scale_immich_up() {
                    echo "Scaling Immich back up..."
                    kubectl scale deploy immich-server --replicas=1 || true
                  }

                  on_error() {
                    local exit_code="$?"
                    local failed_command="${BASH_COMMAND}"

                    echo "Backup failed at command: $failed_command"
                    scale_immich_up
                    notify_failure "$exit_code" "$failed_command"

                    exit "$exit_code"
                  }

                  trap on_error ERR

                  run_job() {
                    local job_name="$1"
                    local job_file="$2"
                    local timeout="${3:-5m}"

                    echo "Deleting old job: $job_name"
                    kubectl delete job "$job_name" --ignore-not-found --wait=true

                    echo "Applying job: $job_name"
                    kubectl apply -f "$job_file"

                    echo "Waiting for job to complete: $job_name"
                    kubectl wait "job/$job_name" --for=condition=complete --timeout="$timeout"

                    echo "Job completed: $job_name"
                  }

                  echo "Scaling Immich down..."
                  kubectl scale deploy immich-server --replicas=0

                  run_job "immich-backup-media" "/configs/backup-media-job.yaml" "5m"
                  run_job "immich-backup-db" "/configs/backup-db-job.yaml" "5m"

                  scale_immich_up

                  notify_success

                  echo "Backup complete."
              envFrom: []
              volumeMounts:
                - name: job-definitions
                  mountPath: /configs
          
          volumes:
            - name: job-definitions
              configMap:
                name: immich-backup-job-definitions
